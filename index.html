<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Global En Vivo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans h-screen flex flex-col justify-between">

    <!-- CABECERA -->
    <header class="bg-slate-800 border-b border-slate-700 p-4 flex items-center justify-between shadow-md">
        <div class="flex items-center space-x-3">
            <div class="bg-emerald-500 p-2 rounded-lg text-white">
                <i data-lucide="globe" class="w-6 h-6 animate-pulse"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg tracking-wide">Chat Global</h1>
                <p class="text-xs text-emerald-400 flex items-center">
                    <span class="w-2 h-2 rounded-full bg-emerald-400 inline-block mr-1.5 animate-ping"></span>
                    En vivo con personas reales
                </p>
            </div>
        </div>
        <div class="flex items-center space-x-2 bg-slate-700/50 px-3 py-1.5 rounded-full border border-slate-600">
            <i data-lucide="user" class="w-4 h-4 text-slate-400"></i>
            <input type="text" id="username-input" value="Usuario Anonimo" class="bg-transparent text-sm font-medium focus:outline-none w-28 text-slate-200" title="Cambiar nombre de usuario">
        </div>
    </header>

    <!-- CONTENEDOR DE MENSAJES -->
    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-900/50 backdrop-blur-sm scrollbar-thin">
        <div class="flex justify-center">
            <span class="bg-slate-800/80 text-slate-400 text-xs px-3 py-1 rounded-full border border-slate-700">
                Conectado al canal global de forma segura. ¡Di hola!
            </span>
        </div>
    </main>

    <!-- ÁREA DE ENTRADA -->
    <footer class="p-4 bg-slate-800/90 border-t border-slate-700/80 backdrop-blur-md">
        <form id="chat-form" class="flex items-center space-x-2 max-w-5xl mx-auto">
            <div class="flex-1 relative flex items-center">
                <input type="text" id="message-input" autocomplete="off" placeholder="Escribe un mensaje aquí..." 
                       class="w-full bg-slate-700/40 border border-slate-600 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 rounded-xl pl-4 pr-10 py-3 text-sm focus:outline-none text-slate-100 placeholder-slate-400 transition-all">
            </div>
            <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white p-3 rounded-xl shadow-lg transition-all flex items-center justify-center">
                <i data-lucide="send" class="w-5 h-5"></i>
            </button>
        </form>
    </footer>

    <!-- Firebase App y Realtime Database SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Tu configuración oficial de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCpszIcvVtVhaNqUu9C2SicT5UbZOrXA8E",
            authDomain: "chatglobal-c68a3.firebaseapp.com",
            databaseURL: "https://chatglobal-c68a3-default-rtdb.firebaseio.com",
            projectId: "chatglobal-c68a3",
            storageBucket: "chatglobal-c68a3.firebasestorage.app",
            messagingSenderId: "149154535708",
            appId: "1:149154535708:web:276b94267ce1c4b5c3c2d9",
            measurementId: "G-03PGJ4HNPK"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, 'messages');

        // Inicializar iconos
        lucide.createIcons();

        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const usernameInput = document.getElementById('username-input');

        // Generar un ID aleatorio por sesión para identificar los mensajes propios
        const myUserId = 'user_' + Math.random().toString(36).substr(2, 9);

        // Guardar el nombre de usuario localmente si se edita
        if(localStorage.getItem('chat_username')) {
            usernameInput.value = localStorage.getItem('chat_username');
        }
        usernameInput.addEventListener('input', () => {
            localStorage.setItem('chat_username', usernameInput.value.trim() || 'Anónimo');
        });

        // ENVIAR MENSAJE A FIREBASE
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            const username = usernameInput.value.trim() || 'Anónimo';

            if (text === '') return;

            const newMessageRef = push(messagesRef);
            set(newMessageRef, {
                userId: myUserId,
                username: username,
                text: text,
                timestamp: serverTimestamp()
            });

            messageInput.value = '';
        });

        // ESCUCHAR MENSAJES EN TIEMPO REAL
        onChildAdded(messagesRef, (snapshot) => {
            const data = snapshot.val();
            const isMe = data.userId === myUserId;
            appendMessage(data.username, data.text, isMe, data.timestamp);
        });

        function appendMessage(username, text, isMe, timestamp) {
            let timeString = "...";
            if(timestamp) {
                timeString = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            const initials = username.substring(0, 2).toUpperCase();
            
            const avatarBg = isMe ? 'bg-emerald-600' : 'bg-indigo-500';
            const nameColor = isMe ? 'text-emerald-400' : 'text-indigo-400';
            const bubbleBg = isMe ? 'bg-emerald-950/40 border-emerald-800/60' : 'bg-slate-800 border-slate-700/60';
            const alignClass = isMe ? 'flex-row-reverse space-x-reverse ml-auto' : 'mr-auto';
            const roundedClass = isMe ? 'rounded-l-xl rounded-br-xl' : 'rounded-r-xl rounded-bl-xl';

            const messageHTML = `
                <div class="flex items-start space-x-2.5 max-w-lg ${alignClass} animate-fade-in">
                    <div class="w-8 h-8 rounded-full ${avatarBg} flex items-center justify-center font-bold text-sm text-white flex-shrink-0 shadow-sm">
                        ${initials}
                    </div>
                    <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                        <div class="flex items-baseline space-x-2 ${isMe ? 'flex-row-reverse space-x-reverse' : ''}">
                            <span class="text-xs font-semibold ${nameColor}">${username}</span>
                            <span class="text-[10px] text-slate-500">${timeString}</span>
                        </div>
                        <div class="mt-1 ${bubbleBg} text-slate-200 p-3 ${roundedClass} text-sm border shadow-md break-words max-w-full">
                            ${text}
                        </div>
                    </div>
                </div>
            `;

            chatBox.insertAdjacentHTML('beforeend', messageHTML);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.15s ease-out forwards; }
    </style>
</body>
</html>
