<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lxna | Digital Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --accent: #7a7aff;
        }

        body { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background: url('https://i.ibb.co/SwjPXRbQ/3606ac0254626d93c320825cb07e69bb.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: white; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }
        
        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container { 
            width: 90%; max-width: 450px; text-align: left; 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 40px; padding: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); display: flex; flex-direction: column; 
            height: 85vh; position: relative;
        }

        @media (min-width: 780px) {
            .container { max-width: 1800px; }
            .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
            .profile-section { margin-bottom: 0 !important; }
            #searchBox { width: 500px !important; margin-bottom: 0 !important; }
            #linkList { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; overflow-y: auto; padding-right: 10px; }
            .link-wrapper { margin-bottom: 0 !important; }
            .extra-info { display: none !important; }
        }

        .profile-section { display: flex; align-items: center; gap: 30px; margin-bottom: 25px; }
        
        .video-avatar-container { 
            width: 150px; height: 100px; border-radius: 20px; border: 2px solid var(--border); 
            overflow: hidden; flex-shrink: 0; box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            cursor: pointer; transition: 0.3s; position: relative; background: rgba(0,0,0,0.2);
        }
        .video-avatar-container:hover { transform: scale(1.05); border-color: var(--accent); }
        .video-avatar-container video { width: 100%; height: 100%; object-fit: cover; opacity: 1; transition: opacity 0.3s; }
        .video-avatar-container video.hidden { opacity: 0; }
        
        #muteBtn {
            position: absolute; bottom: 8px; right: 8px; z-index: 20;
            background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white;
            border-radius: 8px; padding: 4px 8px; cursor: pointer; font-size: 12px;
            backdrop-filter: blur(5px);
        }

        #videoLoader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.3); z-index: 10;
        }
        .small-spinner {
            width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .profile-text h1 { margin: 0; font-size: 1.5rem; font-weight: 600; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .profile-text .description { margin: 0; opacity: 0.9; font-size: 0.85rem; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
        #countDisplay { font-size: 0.75rem; opacity: 0.7; margin-top: 5px; font-weight: 600; }

        #searchBox { 
            width: 100%; padding: 10px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.3); 
            background: rgba(255,255,255,0.2); color: white; margin-bottom: 20px; 
            outline: none; box-sizing: border-box; transition: 0.3s; font-family: 'Inter', sans-serif;
        }
        
        .scroll-area { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }

        .link-wrapper { 
            background: rgba(255, 255, 255, 0.15); border-radius: 20px; margin-bottom: 12px; 
            border: 1px solid var(--border); transition: 0.4s; overflow: hidden;
            animation: fadeInSlide 0.6s ease-out forwards; opacity: 0; position: relative;
        }
        .main-row { display: flex; align-items: center; padding: 10px; cursor: pointer; }
        .link-img { width: 40px; height: 40px; border-radius: 12px; margin-right: 15px; object-fit: cover; }
        .link-text { font-weight: 600; color: white; font-size: 0.95rem; }
        
        .extra-info { padding: 0 15px; max-height: 0; opacity: 0; transition: 0.4s; font-size: 0.8rem; flex-direction: column; gap: 10px; }
        .link-wrapper.open .extra-info { padding: 0 15px 15px 15px; max-height: 150px; opacity: 1; }
        
        .download-btn { cursor: pointer; background: var(--accent); color: white; padding: 10px; border-radius: 10px; text-align: center; font-weight: 600; border: none; width: 100%; }

        #modalOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: rgba(30, 30, 30, 0.9); padding: 30px; border-radius: 20px; display: flex; gap: 20px; align-items: center; max-width: 500px; border: 1px solid var(--border); }
        .modal-img { width: 100px; height: 100px; border-radius: 20px; }
        
        .credits { border-top: 1px solid var(--border); padding-top: 15px; font-size: 0.7rem; opacity: 0.7; margin-top: 10px; text-align: center; }
        .social-icons { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .social-icons img { width: 40px; height: 40px; border-radius: 10px; }

        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <img id="loadImg" src="" alt="item" style="width:80px; height:80px; border-radius:15px; margin-bottom:15px;">
    <div id="loadText" style="font-weight: 600;">Preparando...</div>
    <div class="spinner"></div>
</div>

<div id="modalOverlay" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="modalImg" src="" class="modal-img">
        <div class="modal-info">
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
            <button id="modalBtn" class="download-btn">Descargar</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="header-row">
        <div class="profile-section">
            <div class="video-avatar-container">
                <div id="videoLoader"><div class="small-spinner"></div></div>
                <video id="avatarVideo" playsinline></video>
                <button id="muteBtn"></button>
            </div>
            <div class="profile-text">
                <h1>Lxna</h1>
                <p class="description">• Media fire | Play Store | Etc.</p>
                <div id="countDisplay">Total de Apps: 0</div>
            </div>
        </div>
        <input type="text" id="searchBox" placeholder="Buscar Apps..." onkeyup="filterLinks()">
    </div>

    <div class="scroll-area" id="linkList"></div>

    <div class="credits">Redes Sociales. ¡Suscribete Para más! </div>
    <div class="social-icons">
        <a href="https://www.instagram.com/darwboys?igsh=MWQ5NHg3djA2d2FkeA=="><img src="https://i.ibb.co/xKRS2p8y/9ddfff590791fe00e616a93e0e8b240a.jpg"></a>
        <a href="https://www.tiktok.com/@darwinstivn?_r=1&_t=ZS-9849O2RU549"><img src="https://i.ibb.co/Ckc6Cw4/2df24fbe8a2a9b669e76d726694c052c.jpg"></a>
        <a href="https://youtube.com/@lxnresources?si=Vt5BdEJyZCa2IiBz"><img src="https://i.ibb.co/bMyWvLDW/e208a6d03d5ab5e16cdb4fd3e323ebf4.jpg"></a>
    </div>
</div>

<script>
    const videos = ["https://litter.catbox.moe/55alxppyxyg53z4n.mp4", "https://files.catbox.moe/yhny21.mp4"];
    let currentIndex = 0;
    const videoPlayer = document.getElementById('avatarVideo');
    const muteBtn = document.getElementById('muteBtn');
    const loader = document.getElementById('videoLoader');

    muteBtn.addEventListener('click', () => {
        videoPlayer.muted = !videoPlayer.muted;
        muteBtn.innerText = videoPlayer.muted ? '' : '';
        if (videoPlayer.paused) videoPlayer.play();
    });

    function iniciarCarga(esInicio) {
        loader.style.display = 'flex';
        videoPlayer.classList.add('hidden');
        setTimeout(() => {
            loader.style.display = 'none';
            videoPlayer.classList.remove('hidden');
            videoPlayer.play().catch(() => {
                videoPlayer.muted = true;
                muteBtn.innerText = '';
                videoPlayer.play();
            });
        }, esInicio ? 8000 : 8000);
    }

    videoPlayer.addEventListener('ended', () => {
        currentIndex = (currentIndex + 1) % videos.length;
        videoPlayer.src = videos[currentIndex];
        iniciarCarga(false);
    });

    videoPlayer.src = videos[0];
    videoPlayer.muted = true;
    iniciarCarga(true);

    const Apps = [
        {nombre: "Happy Game", link: "https://apkbomb.com/es/happy-game/#download", img: "https://i.ibb.co/m5pbhVvM/images-3.jpg", info: "No es un juego feliz." },
        { nombre: "Crunchyroll", link: "https://play.google.com/store/apps/details?id=com.crunchyroll.crunchyroid", img: "https://i.ibb.co/7dzMksQn/89fcdebedfdcf2bf3a00a49d75833c3a.jpg", info: "Aplicación de streaming de anime." },
        { nombre: "Tik Tok IOS", link: "https://www.mediafire.com/file/9okl1aleihesag8/TikTok_Gold_v4.70+@flaviakelly.apk/file", img: "https://i.ibb.co/RTW1vb1C/e06487db4c9a77d4f2644cf95e157e61.jpg", info: "Versión modificada estilo IOS." },
        { nombre: "Liquid Glass", link: "https://www.mediafire.com/file/0p855ngwzrzcew6/iLiquidOS_Glass_%2528heyisiinha%2529.apk/file", img: "https://i.ibb.co/FbDSSQGr/45014e7ddcb6b1905ba9f112b813ca23.jpg", info: "Tema visual fluido." },
        { nombre: "Reloj IOS [Samsung]", link: "https://www.mediafire.com/file/99g1yfzbn1ob09e/OPPO+Big+Clock+Font+Set+By+@galaxy_tech.apk/file?dkey=99g1yfzbn1ob09e", img: "https://i.ibb.co/6RV7SZGC/b1314101e4b61700a26c1030e4074c2d.jpg", info: "Widget de reloj tipo Apple." },
        { nombre: "Loverzz [IOS-ANDROID]", link: "https://play.google.com/store/apps/details?id=com.avalanchefactory.loverzz", img: "https://i.ibb.co/SDy5p6N9/unnamed.png", info: "App de parejas." },
        { nombre: "App Store [ANDROID]", link: "https://www.mediafire.com/file/3yk357b4wlunvew/App_Store_%2528IOSAESTHETIC%2529.apk/file?dkey=ze7gviy4jbu&r=742", img: "https://i.ibb.co/hxhHVcTs/ae8d5ae7822e26713f03ffdc2aea905e.jpg", info: "Interfáz estética de AppStore." },
        { nombre: "Caelus [Roblox]", link: "https://gofile.io/d/tQNvXv", img: "https://i.ibb.co/PZTy3QtD/images-2.jpg", info: "Script/App para Roblox." },
        { nombre: "Free Robux ", link: "https://rewards.bing.com/redeem/sku/000471000011", img: "https://i.ibb.co/QF0Tnckc/Robux-2019-Logo-Black-svg.png", info: "Método oficial de Microsoft." },
        { nombre: "Lxna App Android Off", link: "https://appsgeyser.io/19990998/Lxna", img: "https://i.ibb.co/HLT7d2Yv/1784393621732.png", info: "App oficial del canal." },
         { nombre: "Seeke", link: "https://play.google.com/store/apps/details?id=com.enzo.paulo", img: "https://i.ibb.co/Xr6RcGqh/Screenshot-20260718-122657-Google-Play-Store.jpg", info: "Mira tus series y peliculas favoritas sin algun costo alguno." },
    ];
    
    document.getElementById('countDisplay').innerText = `Total de Apps: ${Apps.length}`;
    const listContainer = document.getElementById('linkList');

    Apps.forEach((item, index) => {
        listContainer.innerHTML += `
            <div class="link-wrapper" data-name="${item.nombre}" style="animation-delay: ${index * 0.1}s" onclick="handleItemClick('${item.nombre}', '${item.img}', '${item.info}', '${item.link}', event)">
                <div class="main-row">
                    <img src="${item.img}" class="link-img">
                    <span class="link-text">${item.nombre}</span>
                </div>
                <div class="extra-info">
                    <span>${item.info}</span>
                    <button class="download-btn" onclick="event.stopPropagation(); iniciarDescarga('${item.nombre}', '${item.img}', '${item.link}')">Descargar</button>
                </div>
            </div>
        `;
    });

    function handleItemClick(nombre, img, info, link, event) {
        if (window.innerWidth >= 768) {
            document.getElementById('modalImg').src = img;
            document.getElementById('modalTitle').innerText = nombre;
            document.getElementById('modalDesc').innerText = info;
            document.getElementById('modalBtn').onclick = () => iniciarDescarga(nombre, img, link);
            document.getElementById('modalOverlay').style.display = 'flex';
        } else {
            const wrapper = event.currentTarget;
            const isOpen = wrapper.classList.contains('open');
            document.querySelectorAll('.link-wrapper').forEach(w => w.classList.remove('open'));
            if (!isOpen) wrapper.classList.add('open');
        }
    }

    function iniciarDescarga(nombre, img, link) {
        document.getElementById('modalOverlay').style.display = 'none';
        const overlay = document.getElementById('loadingOverlay');
        document.getElementById('loadImg').src = img;
        document.getElementById('loadText').innerText = `Preparando ${nombre}...`;
        overlay.style.display = 'flex';
        setTimeout(() => {
            window.open(link, '_blank');
            overlay.style.display = 'none';
        }, 3000);
    }

    function filterLinks() {
        let input = document.getElementById('searchBox').value.toLowerCase();
        document.querySelectorAll('.link-wrapper').forEach(item => {
            item.style.display = item.getAttribute('data-name').toLowerCase().includes(input) ? "" : "none";
        });
    }
</script>
</body>
</html>
