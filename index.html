<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lxna | Digital Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --accent: #7a7aff;
        }

        body { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background: url('https://i.ibb.co/SwjPXRbQ/3606ac0254626d93c320825cb07e69bb.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: white; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        
        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container { 
            width: 90%; max-width: 450px; text-align: left; 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 40px; padding: 30px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); display: flex; flex-direction: column; max-height: 85vh; 
        }

        .profile-section { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
        
        .video-avatar-container { 
            width: 80px; height: 80px; border-radius: 20px; border: 2px solid var(--border); 
            overflow: hidden; flex-shrink: 0; box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            cursor: pointer; transition: 0.3s; position: relative; background: rgba(0,0,0,0.2);
        }
        .video-avatar-container:hover { transform: scale(1.05); border-color: var(--accent); }
        .video-avatar-container video { width: 100%; height: 100%; object-fit: cover; opacity: 1; transition: opacity 0.3s; }
        .video-avatar-container video.hidden { opacity: 0; }
        
        #videoLoader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.3); z-index: 10;
        }
        .small-spinner {
            width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .profile-text h1 { margin: 0; font-size: 1.5rem; font-weight: 600; text-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .profile-text .description { margin: 0; opacity: 0.9; font-size: 0.85rem; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
        #countDisplay { font-size: 0.75rem; opacity: 0.7; margin-top: 5px; font-weight: 600; }

        #searchBox { 
            width: 100%; padding: 12px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.3); 
            background: rgba(255,255,255,0.2); color: white; margin-bottom: 20px; 
            outline: none; box-sizing: border-box; transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        #searchBox::placeholder { color: rgba(255,255,255,0.7); }
        #searchBox:focus { background: rgba(255,255,255,0.3); border-color: var(--accent); }
        
        .scroll-area { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }

        .link-wrapper { 
            background: rgba(255, 255, 255, 0.15); border-radius: 20px; margin-bottom: 12px; 
            border: 1px solid var(--border); transition: 0.4s; overflow: hidden;
            animation: fadeInSlide 0.6s ease-out forwards; opacity: 0; position: relative;
        }

        .link-wrapper:hover { background: rgba(255, 255, 255, 0.25); border-color: rgba(255,255,255,0.5); }
        
        .main-row { display: flex; align-items: center; padding: 10px; cursor: pointer; }
        .link-img { width: 45px; height: 45px; border-radius: 12px; margin-right: 15px; object-fit: cover; transition: 0.4s; }
        .link-text { font-weight: 600; text-decoration: none; color: white; font-size: 0.95rem; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        
        .extra-info { padding: 0 15px; max-height: 0; opacity: 0; transition: 0.4s; font-size: 0.8rem; line-height: 1.5; color: white; display: flex; flex-direction: column; gap: 10px; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .link-wrapper.open .extra-info { padding: 0 15px 15px 15px; max-height: 150px; opacity: 1; }
        
        .download-btn { 
            cursor: pointer; background: var(--accent); color: white; text-decoration: none; padding: 10px; 
            border-radius: 10px; text-align: center; font-weight: 600; font-size: 0.85rem; border: none; width: 100%;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .download-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

        .credits { border-top: 1px solid var(--border); padding-top: 15px; font-size: 0.7rem; opacity: 0.7; margin-top: 10px; text-align: center; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .social-icons { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .social-icons a { transition: transform 0.2s; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        .social-icons a:hover { transform: scale(1.15); }
        .social-icons img { width: 40px; height: 40px; border-radius: 10px; }

        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; text-align: center;
        }
        #loadingOverlay img { width: 80px; height: 80px; border-radius: 15px; margin-bottom: 15px; border: 2px solid white; }
        
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin-top: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <img id="loadImg" src="" alt="item">
    <div id="loadText" style="font-weight: 600;">Preparando Sitio Web...</div>
    <div class="spinner"></div>
</div>

<div class="container">
    <div class="profile-section">
        <div class="video-avatar-container">
            <div id="videoLoader"><div class="small-spinner"></div></div>
            <video id="avatarVideo" muted playsinline></video>
        </div>
        <div class="profile-text">
            <h1>Lxna</h1>
            <p class="description">• Media fire | Play Store | Etc.</p>
            <div id="countDisplay">Total de Apps: 0</div>
        </div>
    </div>

    <input type="text" id="searchBox" placeholder="Buscar Apps..." onkeyup="filterLinks()">

    <div class="scroll-area" id="linkList"></div>

    <div class="credits">Redes Sociales. ¡Suscribete Para más! </div>

    <div class="social-icons">
        <a href="https://www.instagram.com/darwboys?igsh=MWQ5NHg3djA2d2FkeA==" target="_blank"><img src="https://i.ibb.co/xKRS2p8y/9ddfff590791fe00e616a93e0e8b240a.jpg" alt="Instagram"></a>
        <a href="https://www.tiktok.com/@darwinstivn?_r=1&_t=ZS-9849O2RU549" target="_blank"><img src="https://i.ibb.co/Ckc6Cw4/2df24fbe8a2a9b669e76d726694c052c.jpg" alt="TikTok"></a>
        <a href="https://youtube.com/@lxnresources?si=Vt5BdEJyZCa2IiBz" target="_blank"><img src="https://i.ibb.co/bMyWvLDW/e208a6d03d5ab5e16cdb4fd3e323ebf4.jpg" alt="YouTube"></a>
    </div>
    <div class="credits">Desarrollado Por Lxn Resources Y Gemini IA </div>
</div>

<script>
    const videos = [
        "https://files.catbox.moe/yhny21.mp4",
        "https://files.catbox.moe/pho2wv.mp4"
    ];

    let currentIndex = 0;
    const videoPlayer = document.getElementById('avatarVideo');
    const loader = document.getElementById('videoLoader');

    function iniciarCarga(esInicio) {
        loader.style.display = 'flex';
        videoPlayer.classList.add('hidden');
        
        // 1000ms al inicio, 1030ms en transiciones
        const tiempoEspera = esInicio ? 10000 : 10030;
        
        setTimeout(() => {
            loader.style.display = 'none';
            videoPlayer.classList.remove('hidden');
            videoPlayer.play();
        }, tiempoEspera);
    }

    function playNext() {
        currentIndex = (currentIndex + 1) % videos.length;
        videoPlayer.src = videos[currentIndex];
        videoPlayer.load();
        iniciarCarga(false);
    }

    videoPlayer.addEventListener('ended', playNext);
    
    // Inicializar
    videoPlayer.src = videos[0];
    iniciarCarga(true);

    const Apps = [
        { nombre: "Crunchyroll", link: "https://play.google.com/store/apps/details?id=com.crunchyroll.crunchyroid", img: "https://i.ibb.co/7dzMksQn/89fcdebedfdcf2bf3a00a49d75833c3a.jpg", info: "" },
        { nombre: "Tik Tok IOS", link: "https://www.mediafire.com/file/9okl1aleihesag8/TikTok_Gold_v4.70+@flaviakelly.apk/file", img: "https://i.ibb.co/RTW1vb1C/e06487db4c9a77d4f2644cf95e157e61.jpg", info: "" },
        { nombre: "Liquid Glass", link: "https://www.mediafire.com/file/0p855ngwzrzcew6/iLiquidOS_Glass_%2528heyisiinha%2529.apk/file", img: "https://i.ibb.co/FbDSSQGr/45014e7ddcb6b1905ba9f112b813ca23.jpg", info: "" },
        { nombre: "Reloj IOS [Samsung]", link: "https://www.mediafire.com/file/99g1yfzbn1ob09e/OPPO+Big+Clock+Font+Set+By+@galaxy_tech.apk/file?dkey=99g1yfzbn1ob09e", img: "https://i.ibb.co/6RV7SZGC/b1314101e4b61700a26c1030e4074c2d.jpg", info: "" },
        { nombre: "Loverzz [IOS-ANDROID]", link: "https://play.google.com/store/apps/details?id=com.avalanchefactory.loverzz", img: "https://i.ibb.co/SDy5p6N9/unnamed.png", info: "" },
        { nombre: "App Store [ANDROID]", link: "https://www.mediafire.com/file/3yk357b4wlunvew/App_Store_%2528IOSAESTHETIC%2529.apk/file?dkey=ze7gviy4jbu&r=742", img: "https://i.ibb.co/hxhHVcTs/ae8d5ae7822e26713f03ffdc2aea905e.jpg", info: "" },
        { nombre: "Caelus [Roblox]", link: "https://gofile.io/d/tQNvXv", img: "https://i.ibb.co/PZTy3QtD/images-2.jpg", info: "" },
        { nombre: "Free Robux ", link: "https://rewards.bing.com/redeem/sku/000471000011", img: "https://i.ibb.co/QF0Tnckc/Robux-2019-Logo-Black-svg.png", info: "" },
        { nombre: "Lxna App Android Off", link: "https://appsgeyser.io/19985223/Lxna", img: "https://i.ibb.co/gMgT8wT5/6288ba0f02e87d7b330ca61c3712c81d.jpg", info: "" },
    ];
    
    document.getElementById('countDisplay').innerText = `Total de Apps: ${Apps.length}`;
    const listContainer = document.getElementById('linkList');

    Apps.forEach((item, index) => {
        listContainer.innerHTML += `
            <div class="link-wrapper" data-name="${item.nombre}" style="animation-delay: ${index * 0.1}s">
                <div class="main-row" onclick="toggleInfo(this)">
                    <img src="${item.img}" class="link-img" alt="${item.nombre}">
                    <span class="link-text">${item.nombre}</span>
                </div>
                <div class="extra-info">
                    <span>${item.info}</span>
                    <button class="download-btn" onclick="iniciarDescarga('${item.nombre}', '${item.img}', '${item.link}')">Descargar</button>
                </div>
            </div>
        `;
    });

    function toggleInfo(el) {
        const wrapper = el.closest('.link-wrapper');
        const isOpen = wrapper.classList.contains('open');
        document.querySelectorAll('.link-wrapper').forEach(w => w.classList.remove('open'));
        if (!isOpen) wrapper.classList.add('open');
    }

    function iniciarDescarga(nombre, img, link) {
        const overlay = document.getElementById('loadingOverlay');
        const loadImg = document.getElementById('loadImg');
        const loadText = document.getElementById('loadText');
        
        loadImg.src = img;
        loadText.innerText = `Preparando ${nombre}...`;
        overlay.style.display = 'flex';
        
        setTimeout(() => {
            loadText.innerText = "Verificado";
            setTimeout(() => {
                window.open(link, '_blank');
                overlay.style.display = 'none';
            }, 800);
        }, 4000);
    }

    function filterLinks() {
        let input = document.getElementById('searchBox').value.toLowerCase();
        document.querySelectorAll('.link-wrapper').forEach(item => {
            item.style.display = item.getAttribute('data-name').toLowerCase().includes(input) ? "" : "none";
        });
    }
</script>
</body>
</html>
