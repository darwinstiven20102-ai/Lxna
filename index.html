<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Global En Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black text-white font-sans h-screen flex flex-col justify-between select-none">

    <header class="bg-black border-b border-zinc-800 p-4 flex items-center justify-between sticky top-0 z-10">
        <div class="flex items-center space-x-3 cursor-pointer" id="global-header-btn">
            <div class="bg-gradient-to-tr from-yellow-500 via-red-500 to-purple-600 p-0.5 rounded-full">
                <div class="bg-black p-1.5 rounded-full text-white">
                    <i data-lucide="globe" id="header-icon" class="w-5 h-5"></i>
                </div>
            </div>
            <div>
                <h1 class="font-bold text-base tracking-wide flex items-center space-x-1">
                    <span id="chat-title-text">Chat Global</span>
                    <i data-lucide="chevron-down" class="w-4 h-4 text-zinc-400"></i>
                </h1>
                <p class="text-[11px] text-zinc-400 flex items-center">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 inline-block mr-1"></span>
                    En vivo
                </p>
            </div>
        </div>
        <div class="flex items-center space-x-2 bg-zinc-900 px-3 py-1.5 rounded-full border border-zinc-800">
            <i data-lucide="user" class="w-3.5 h-3.5 text-zinc-400"></i>
            <input type="text" id="username-input" value="Usuario Anonimo" class="bg-transparent text-xs font-medium focus:outline-none w-24 text-zinc-200" title="Cambiar nombre de usuario">
        </div>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 bg-black scrollbar-none pb-12">
        </main>

    <div id="action-menu" class="fixed inset-0 bg-black/40 backdrop-blur-xs z-50 hidden flex items-center justify-center p-4" onclick="closeActionMenu()">
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl w-full max-w-xs overflow-hidden shadow-2xl animate-scale-up" onclick="event.stopPropagation()">
            <div id="menu-options" class="flex flex-col">
                <button id="btn-menu-private-chat" class="flex items-center space-x-3 px-4 py-3 hover:bg-zinc-800 text-left text-sm transition-colors border-b border-zinc-800/50 hidden">
                    <i data-lucide="message-square" class="w-4 h-4 text-sky-400"></i>
                    <span id="text-menu-private-chat">Chatear</span>
                </button>
                <button id="btn-menu-edit" class="flex items-center space-x-3 px-4 py-3 hover:bg-zinc-800 text-left text-sm transition-colors border-b border-zinc-800/50">
                    <i data-lucide="pencil" class="w-4 h-4 text-zinc-400"></i>
                    <span>Editar mensaje</span>
                </button>
                <button id="btn-menu-delete" class="flex items-center space-x-3 px-4 py-3 hover:bg-zinc-800 text-left text-sm text-red-400 transition-colors">
                    <i data-lucide="trash-2" class="w-4 h-4 text-red-400"></i>
                    <span id="text-menu-delete">Eliminar para todos</span>
                </button>
            </div>
        </div>
    </div>

    <footer class="p-4 bg-black border-t border-zinc-900 sticky bottom-0 z-10">
        <form id="chat-form" class="flex flex-col max-w-3xl mx-auto relative">
            <div id="recording-waveform" class="hidden flex items-center justify-center space-x-1 py-2 mb-2 bg-zinc-900/80 border border-zinc-800 rounded-xl animate-fade-in">
                <span class="text-xs text-red-500 font-medium mr-2 flex items-center">
                    <span class="w-2 h-2 rounded-full bg-red-500 mr-1.5 animate-pulse"></span> Grabando Audio
                </span>
                <div class="w-1 h-4 bg-red-500 rounded-full wave-bar"></div>
                <div class="w-1 h-6 bg-red-500 rounded-full wave-bar"></div>
                <div class="w-1 h-3 bg-red-500 rounded-full wave-bar"></div>
                <div class="w-1 h-5 bg-red-500 rounded-full wave-bar"></div>
                <div class="w-1 h-2 bg-red-500 rounded-full wave-bar"></div>
            </div>

            <div class="flex items-center space-x-2 w-full relative">
                <div class="relative flex items-center">
                    <button type="button" id="plus-btn" class="bg-zinc-900 border border-zinc-800 hover:border-zinc-700 text-white p-2.5 rounded-full transition-all active:scale-95 flex items-center justify-center">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                    </button>
                    <div id="attachment-menu" class="absolute bottom-14 left-0 bg-zinc-900 border border-zinc-800 rounded-2xl hidden flex-col w-40 overflow-hidden shadow-2xl z-20 animate-scale-up">
                        <button type="button" id="opt-camera" class="flex items-center space-x-2 px-4 py-3 hover:bg-zinc-800 text-left text-xs transition-colors border-b border-zinc-800/50">
                            <i data-lucide="camera" class="w-4 h-4 text-zinc-400"></i>
                            <span>Tomar foto</span>
                        </button>
                        <button type="button" id="opt-gallery" class="flex items-center space-x-2 px-4 py-3 hover:bg-zinc-800 text-left text-xs transition-colors">
                            <i data-lucide="image" class="w-4 h-4 text-zinc-400"></i>
                            <span>Dispositivo</span>
                        </button>
                    </div>
                    <input type="file" id="camera-input" accept="image/*" capture="camera" class="hidden">
                    <input type="file" id="gallery-input" accept="image/*" class="hidden">
                </div>

                <div class="flex-1 relative flex items-center bg-zinc-900 border border-zinc-800 rounded-full px-4 py-2.5 focus-within:border-zinc-700 transition-all">
                    <input type="text" id="message-input" autocomplete="off" placeholder="Escribe un mensaje aquí..." 
                           class="w-full bg-transparent text-sm focus:outline-none text-white placeholder-zinc-500 pr-14 select-text">
                    <button type="submit" class="absolute right-4 text-sky-500 hover:text-sky-400 font-semibold text-sm transition-all active:scale-95">
                        Enviar
                    </button>
                </div>
                <button type="button" id="mic-btn" class="bg-zinc-900 border border-zinc-800 hover:border-zinc-700 text-white p-2.5 rounded-full transition-all active:scale-95 flex items-center justify-center relative">
                    <i data-lucide="mic" id="mic-icon" class="w-5 h-5"></i>
                    <span id="mic-pulse" class="absolute inset-0 rounded-full bg-red-500/20 animate-ping hidden"></span>
                </button>
            </div>
        </form>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, update, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpszIcvVtVhaNqUu9C2SicT5UbZOrXA8E",
            authDomain: "chatglobal-c68a3.firebaseapp.com",
            databaseURL: "https://chatglobal-c68a3-default-rtdb.firebaseio.com",
            projectId: "chatglobal-c68a3",
            storageBucket: "chatglobal-c68a3.firebasestorage.app",
            messagingSenderId: "149154535708",
            appId: "1:149154535708:web:276b94267ce1c4b5c3c2d9",
            measurementId: "G-03PGJ4HNPK"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Control de rutas del chat activo
        let currentChatMode = 'global'; 
        let privateChatId = null;
        let currentActiveRef = ref(db, 'messages');
        let unsubscribeCurrentListener = null;

        lucide.createIcons();

        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const usernameInput = document.getElementById('username-input');
        const micBtn = document.getElementById('mic-btn');
        const micIcon = document.getElementById('mic-icon');
        const micPulse = document.getElementById('mic-pulse');
        const recordingWaveform = document.getElementById('recording-waveform');
        
        const plusBtn = document.getElementById('plus-btn');
        const attachmentMenu = document.getElementById('attachment-menu');
        const optCamera = document.getElementById('opt-camera');
        const optGallery = document.getElementById('opt-gallery');
        const cameraInput = document.getElementById('camera-input');
        const galleryInput = document.getElementById('gallery-input');

        const actionMenu = document.getElementById('action-menu');
        const menuOptions = document.getElementById('menu-options');
        const btnMenuEdit = document.getElementById('btn-menu-edit');
        const btnMenuDelete = document.getElementById('btn-menu-delete');
        const btnMenuPrivateChat = document.getElementById('btn-menu-private-chat');
        const textMenuPrivateChat = document.getElementById('text-menu-private-chat');
        const globalHeaderBtn = document.getElementById('global-header-btn');
        const chatTitleText = document.getElementById('chat-title-text');
        const headerIcon = document.getElementById('header-icon');

        if (!localStorage.getItem('chat_user_id')) {
            localStorage.setItem('chat_user_id', 'user_' + Math.random().toString(36).substr(2, 9));
        }
        const myUserId = localStorage.getItem('chat_user_id');

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        let selectedMessageId = null;

        // --- LÓGICA DE NOMBRE OBLIGATORIO Y LÍMITE DE 37 DÍAS ---
        let localName = localStorage.getItem('chat_username');
        let localNameDate = localStorage.getItem('chat_username_change_date');

        if (!localName || localName === 'Usuario Anonimo' || localName.trim() === '') {
            let forcedName = '';
            while (!forcedName || forcedName.trim() === '' || forcedName === 'Usuario Anonimo') {
                forcedName = prompt('Por favor, ingresa un nombre obligatorio para usar el chat:');
            }
            localName = forcedName.trim();
            localNameDate = Date.now().toString();
            localStorage.setItem('chat_username', localName);
            localStorage.setItem('chat_username_change_date', localNameDate);
        }

        usernameInput.value = localName;

        const msIn37Days = 37 * 24 * 60 * 60 * 1000; 
        if (localNameDate && (Date.now() - parseInt(localNameDate) < msIn37Days)) {
            usernameInput.disabled = true;
            usernameInput.title = "No puedes cambiar tu nombre hasta cumplir el lapso de 37 días.";
            usernameInput.classList.add('opacity-50', 'cursor-not-allowed');
        }

        usernameInput.addEventListener('input', () => {
            if (usernameInput.disabled) return;
            const updatedName = usernameInput.value.trim();
            if (updatedName !== '' && updatedName !== 'Usuario Anonimo') {
                localStorage.setItem('chat_username', updatedName);
                localStorage.setItem('chat_username_change_date', Date.now().toString());
            }
        });
        // --------------------------------------------------------

        plusBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            attachmentMenu.classList.toggle('hidden');
        });

        document.addEventListener('click', () => {
            attachmentMenu.classList.add('hidden');
        });

        optCamera.addEventListener('click', () => cameraInput.click());
        optGallery.addEventListener('click', () => galleryInput.click());

        function handleImageUpload(inputElement) {
            const file = inputElement.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = () => {
                const base64Image = reader.result;
                const username = usernameInput.value.trim() || 'Anónimo';

                const newMessageRef = push(currentActiveRef);
                set(newMessageRef, {
                    userId: myUserId,
                    username: username,
                    image: base64Image,
                    type: 'image',
                    timestamp: serverTimestamp()
                });
            };
            inputElement.value = '';
        }

        cameraInput.addEventListener('change', () => handleImageUpload(cameraInput));
        galleryInput.addEventListener('change', () => handleImageUpload(galleryInput));

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            const username = usernameInput.value.trim() || 'Anónimo';

            if (text === '') return;

            const newMessageRef = push(currentActiveRef);
            set(newMessageRef, {
                userId: myUserId,
                username: username,
                text: text,
                type: 'text',
                timestamp: serverTimestamp()
            });

            messageInput.value = '';
        });

        micBtn.addEventListener('click', async () => {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => {
                            const base64Audio = reader.result;
                            const username = usernameInput.value.trim() || 'Anónimo';
                            
                            const newMessageRef = push(currentActiveRef);
                            set(newMessageRef, {
                                userId: myUserId,
                                username: username,
                                audio: base64Audio,
                                type: 'audio',
                                timestamp: serverTimestamp()
                            });
                        };

                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    micBtn.classList.add('bg-red-600', 'border-red-500');
                    micIcon.classList.add('text-white');
                    micPulse.classList.remove('hidden');
                    recordingWaveform.classList.remove('hidden');
                    recordingWaveform.classList.add('flex');

                } catch (err) {
                    alert('No se pudo acceder al micrófono: ' + err.message);
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                micBtn.classList.remove('bg-red-600', 'border-red-500');
                micIcon.classList.remove('text-white');
                micPulse.classList.add('hidden');
                recordingWaveform.classList.add('hidden');
                recordingWaveform.classList.remove('flex');
            }
        });

        // Gestionar conexión activa y sincronizar con Firebase
        function listenToMessages() {
            if (unsubscribeCurrentListener) {
                unsubscribeCurrentListener();
            }

            unsubscribeCurrentListener = onValue(currentActiveRef, (snapshot) => {
                const isAtBottom = chatBox.scrollHeight - chatBox.clientHeight <= chatBox.scrollTop + 100;

                const welcomeText = currentChatMode === 'global' 
                    ? 'Conectado al canal global de forma segura. ¡Mantén presionado un mensaje para ver opciones!'
                    : 'Estás en un chat privado seguro y cifrado. Presiona "Chat privado" en la cabecera para regresar.';

                chatBox.innerHTML = `
                    <div class="flex justify-center my-4">
                        <span class="text-zinc-500 text-xs text-center px-4">
                            ${welcomeText}
                        </span>
                    </div>
                `;
                
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const messageId = childSnapshot.key;
                        const data = childSnapshot.val();
                        const isMe = data.userId === myUserId;
                        appendMessage(messageId, data, isMe);
                    });
                }

                if (isAtBottom) {
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            });
        }

        // Evento para alternar de regreso al Chat Global al tocar la cabecera
        globalHeaderBtn.addEventListener('click', () => {
            if (currentChatMode !== 'global') {
                currentChatMode = 'global';
                privateChatId = null;
                chatTitleText.innerText = 'Chat Global';
                headerIcon.setAttribute('data-lucide', 'globe');
                currentActiveRef = ref(db, 'messages');
                listenToMessages();
                lucide.createIcons();
            }
        });

        window.toggleAudioPlay = function(btn, audioId) {
            const audioEl = document.getElementById(audioId);
            const playIcon = btn.querySelector('.play-ic');
            const pauseIcon = btn.querySelector('.pause-ic');
            const progressEl = btn.closest('.audio-player-container').querySelector('.audio-progress');
            const timeEl = btn.closest('.audio-player-container').querySelector('.audio-time');

            if (audioEl.paused) {
                document.querySelectorAll('audio').forEach(a => {
                    if (a.id !== audioId && !a.paused) {
                        a.pause();
                        const trackingBtn = a.closest('.message-bubble').querySelector('.audio-play-btn');
                        if (trackingBtn) {
                            trackingBtn.querySelector('.play-ic').classList.remove('hidden');
                            trackingBtn.querySelector('.pause-ic').classList.add('hidden');
                        }
                    }
                });

                audioEl.play();
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                audioEl.pause();
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }

            audioEl.ontimeupdate = () => {
                const percentage = (audioEl.currentTime / audioEl.duration) * 100;
                progressEl.style.width = `${percentage}%`;
                
                let mins = Math.floor(audioEl.currentTime / 60);
                let secs = Math.floor(audioEl.currentTime % 60);
                timeEl.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            };

            audioEl.onended = () => {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                progressEl.style.width = '0%';
                timeEl.innerText = '0:00';
            };

            audioEl.onloadedmetadata = () => {
                let mins = Math.floor(audioEl.duration / 60);
                let secs = Math.floor(audioEl.duration % 60);
                if (!isNaN(audioEl.duration)) {
                    timeEl.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                }
            };
        };

        function appendMessage(messageId, data, isMe) {
            let timeString = "...";
            if(data.timestamp) {
                timeString = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            const initials = data.username.substring(0, 2).toUpperCase();
            
            const avatarBg = isMe ? 'hidden' : 'bg-zinc-800 border border-zinc-700';
            const bubbleBg = isMe ? 'bg-gradient-to-r from-purple-600 to-blue-500 text-white' : 'bg-zinc-950 border border-zinc-800 text-zinc-100';
            const alignClass = isMe ? 'justify-end' : 'justify-start';
            const roundedClass = isMe ? 'rounded-[20px] rounded-br-[4px]' : 'rounded-[20px] rounded-bl-[4px]';

            let contentHTML = '';
            if (data.type === 'audio' || data.audio) {
                const uniqueAudioId = `native-audio-${messageId}`;
                contentHTML = `
                    <div class="flex items-center space-x-3 py-1.5 min-w-[210px] audio-player-container select-none" onclick="event.stopPropagation();">
                        <audio id="${uniqueAudioId}" src="${data.audio}" class="hidden" preload="metadata"></audio>
                        
                        <button onclick="toggleAudioPlay(this, '${uniqueAudioId}')" class="audio-play-btn flex items-center justify-center w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 transition-all flex-shrink-0 active:scale-95">
                            <i data-lucide="play" class="w-4 h-4 play-ic text-white fill-white"></i>
                            <i data-lucide="pause" class="w-4 h-4 pause-ic text-white fill-white hidden"></i>
                        </button>
                        
                        <div class="flex-1 flex flex-col justify-center space-y-1">
                            <div class="relative w-full h-1 bg-white/20 rounded-full overflow-hidden">
                                <div class="audio-progress absolute top-0 left-0 h-full bg-white rounded-full transition-all duration-100" style="w-0%"></div>
                            </div>
                            <div class="flex justify-between items-center text-[10px] opacity-60">
                                <span class="audio-time font-mono">0:00</span>
                                <i data-lucide="mic" class="w-3 h-3"></i>
                            </div>
                        </div>
                    </div>
                `;
            } else if (data.type === 'image' || data.image) {
                contentHTML = `<img src="${data.image}" class="max-w-[200px] rounded-xl object-cover" onclick="event.stopPropagation();" alt="Imagen">`;
            } else {
                contentHTML = `<div class="text-[14px] break-words leading-snug select-text">${data.text || ''}</div>`;
            }

            const messageHTML = `
                <div class="flex items-end space-x-2 w-full max-w-2xl mx-auto ${alignClass} animate-fade-in relative group custom-msg-select"
                     data-id="${messageId}" 
                     data-me="${isMe}" 
                     data-userid="${data.userId}"
                     data-username="${btoa(encodeURIComponent(data.username || 'Anónimo'))}"
                     data-type="${data.type || 'text'}" 
                     data-text="${btoa(encodeURIComponent(data.text || ''))}"
                     oncontextmenu="event.preventDefault(); openMessageMenu(this);"
                     onload="setupLongPress(this)">
                    
                    ${!isMe ? `
                    <div class="w-7 h-7 rounded-full ${avatarBg} flex items-center justify-center font-bold text-[10px] text-zinc-300 flex-shrink-0 shadow-sm">
                        ${initials}
                    </div>` : ''}
                    
                    <div class="flex flex-col max-w-[70%] ${isMe ? 'items-end' : 'items-start'} relative pb-1">
                        ${!isMe ? `<span class="text-[10px] font-medium text-zinc-500 mb-0.5 ml-2">${data.username}</span>` : ''}
                        <div class="message-bubble ${bubbleBg} px-4 py-2.5 ${roundedClass} shadow-sm relative cursor-pointer active:opacity-80 transition-opacity" onclick="openMessageMenu(this.closest('[data-id]'))">
                            ${contentHTML}
                        </div>
                        <span class="text-[9px] text-zinc-600 mt-1 px-1">${timeString} ${data.edited ? '(editado)' : ''}</span>
                    </div>
                </div>
            `;

            chatBox.insertAdjacentHTML('beforeend', messageHTML);
            
            const element = chatBox.lastElementChild;
            setupLongPress(element);
            
            lucide.createIcons();
        }

        function setupLongPress(element) {
            let pressTimer;
            
            const startPress = () => {
                pressTimer = setTimeout(() => {
                    openMessageMenu(element);
                }, 500);
            };

            const cancelPress = () => {
                clearTimeout(pressTimer);
            };

            element.addEventListener('touchstart', startPress, { passive: true });
            element.addEventListener('touchend', cancelPress, { passive: true });
            element.addEventListener('touchmove', cancelPress, { passive: true });
            element.addEventListener('mousedown', startPress);
            element.addEventListener('mouseup', cancelPress);
            element.addEventListener('mouseleave', cancelPress);
        }

        window.openMessageMenu = function(element) {
            if (navigator.vibrate) {
                navigator.vibrate(40);
            }
            selectedMessageId = element.getAttribute('data-id');
            const isMe = element.getAttribute('data-me') === 'true';
            const targetUserId = element.getAttribute('data-userid');
            const targetUsername = decodeURIComponent(atob(element.getAttribute('data-username')));
            const isAudio = element.getAttribute('data-type') === 'audio';
            const isImage = element.getAttribute('data-type') === 'image';
            const encodedText = element.getAttribute('data-text');

            const textMenuDelete = document.getElementById('text-menu-delete');

            // Mostrar opción de chat privado si el mensaje no es del propio usuario logueado
            if (!isMe && currentChatMode === 'global') {
                btnMenuPrivateChat.classList.remove('hidden');
                textMenuPrivateChat.innerText = `Chat privado con ${targetUsername}`;
                btnMenuPrivateChat.onclick = () => {
                    closeActionMenu();
                    startPrivateChat(targetUserId, targetUsername);
                };
            } else {
                btnMenuPrivateChat.classList.add('hidden');
            }

            if (isMe) {
                menuOptions.classList.remove('hidden');
                btnMenuEdit.classList.remove('hidden');
                textMenuDelete.innerText = "Eliminar para todos";
                if(isAudio || isImage) {
                    btnMenuEdit.classList.add('hidden');
                } else {
                    btnMenuEdit.classList.remove('hidden');
                    btnMenuEdit.onclick = () => { closeActionMenu(); triggerEdit(selectedMessageId, encodedText); };
                }
                btnMenuDelete.onclick = () => { closeActionMenu(); triggerDelete(selectedMessageId); };
            } else {
                // Si NO es mi mensaje, ocultamos el botón de editar obligatoriamente
                btnMenuEdit.classList.add('hidden');
                menuOptions.classList.remove('hidden');
                
                // Cambiar el texto a eliminar para mí solo y configurar acción local
                textMenuDelete.innerText = "Eliminar para mi solo";
                btnMenuDelete.onclick = () => {
                    closeActionMenu();
                    if (confirm('¿Seguro que deseas eliminar este mensaje para ti solo?')) {
                        const targetBubble = document.querySelector(`[data-id="${selectedMessageId}"]`);
                        if(targetBubble) targetBubble.remove();
                    }
                };

                if (currentChatMode !== 'global') {
                    // Mantiene compatibilidad original con chats privados ajenos si fuera necesario
                }
            }

            actionMenu.classList.remove('hidden');
            actionMenu.classList.add('flex');
        };

        // Lógica de inicialización para salas de chat privado
        function startPrivateChat(targetUserId, targetUsername) {
            currentChatMode = 'private';
            // Crear identificador alfabético único basado en los dos IDs de usuario
            const sortedIds = [myUserId, targetUserId].sort();
            privateChatId = `chat_${sortedIds[0]}_${sortedIds[1]}`;
            
            chatTitleText.innerText = `Chat privado`;
            headerIcon.setAttribute('data-lucide', 'message-square');
            
            currentActiveRef = ref(db, `private_messages/${privateChatId}`);
            listenToMessages();
            lucide.createIcons();
        }

        window.closeActionMenu = function() {
            actionMenu.classList.remove('flex');
            actionMenu.classList.add('hidden');
        };

        function triggerEdit(messageId, encodedText) {
            const currentText = decodeURIComponent(atob(encodedText));
            const newText = prompt('Edita tu mensaje:', currentText);
            
            if (newText !== null && newText.trim() !== '' && newText.trim() !== currentText) {
                const messageRef = ref(db, `${currentChatMode === 'global' ? 'messages' : 'private_messages/' + privateChatId}/${messageId}`);
                update(messageRef, {
                    text: newText.trim(),
                    edited: true
                }).catch((error) => alert('Error al editar: ' + error.message));
            }
        }

        function triggerDelete(messageId) {
            if (confirm('¿Seguro que deseas eliminar este mensaje para todos?')) {
                const messageRef = ref(db, `${currentChatMode === 'global' ? 'messages' : 'private_messages/' + privateChatId}/${messageId}`);
                remove(messageRef).catch((error) => alert('Error alPost: ' + error.message));
            }
        }

        // Ejecución inicial en canal global
        listenToMessages();
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes waveGlow {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.8); }
        }
        .animate-fade-in { animation: fadeIn 0.1s ease-out forwards; }
        .animate-scale-up { animation: scaleUp 0.12s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        
        .wave-bar { animation: waveGlow 0.6s ease-in-out infinite; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    </style>
</body>
</html>
