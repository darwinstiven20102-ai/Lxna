<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Global En Vivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#0B141A] text-zinc-100 font-sans h-screen flex flex-col justify-between select-none overflow-hidden antialiased">

    <!-- Notificación In-App Estilo iOS/Instagram -->
    <div id="in-app-notification" class="fixed top-4 left-1/2 -translate-x-1/2 bg-zinc-900 text-white px-4 py-3 rounded-2xl shadow-[0_12px_40px_rgba(0,0,0,0.5)] z-50 hidden items-center space-x-3 cursor-pointer hover:bg-zinc-800/90 transition-all max-w-[380px] w-[92%] animate-scale-up border border-zinc-800/60 backdrop-blur-md">
        <div id="notif-avatar" class="w-10 h-10 bg-gradient-to-tr from-purple-600 to-blue-500 rounded-full flex items-center justify-center font-bold text-xs text-white flex-shrink-0 uppercase tracking-wider">
            U
        </div>
        <div class="flex-1 overflow-hidden">
            <div class="flex items-center justify-between">
                <h4 class="text-[13px] font-bold text-zinc-100 truncate pr-2" id="notif-user">Usuario</h4>
                <span class="text-[11px] text-zinc-500 font-normal flex-shrink-0">ahora</span>
            </div>
            <p class="text-[13px] text-zinc-400 truncate mt-0.5" id="notif-text">Te envió un mensaje</p>
        </div>
        <div class="flex-shrink-0 pl-1">
            <button class="bg-blue-600 text-white text-[12px] font-semibold px-3 py-1.5 rounded-xl hover:bg-blue-500 transition-colors shadow-md active:scale-95">
                Responder
            </button>
        </div>
    </div>

    <!-- Sidebar de Conversaciones Estilo Messenger / WhatsApp -->
    <div id="sidebar-chats" class="fixed inset-y-0 left-0 w-80 bg-[#111B21] border-r border-zinc-800/80 z-40 transform -translate-x-full transition-transform duration-300 cubic-bezier(0.4, 0, 0.2, 1) flex flex-col shadow-2xl">
        <div class="p-4 border-b border-zinc-800/80 flex items-center justify-between bg-[#111B21]">
            <h2 class="font-bold text-base tracking-wide text-zinc-100">Conversaciones</h2>
            <button onclick="toggleSidebar(false)" class="text-zinc-400 hover:text-white p-1 hover:bg-zinc-800 rounded-full transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        
        <div class="p-3 bg-[#111B21]">
            <div class="flex items-center space-x-2 bg-[#202C33] px-3 py-2 rounded-xl border border-transparent focus-within:border-zinc-700 transition-all">
                <button onclick="goToGlobalChat(); toggleSidebar(false);" class="text-zinc-400 hover:text-sky-400 transition-colors mr-1" title="Volver al Chat Global">
                    <i data-lucide="globe" class="w-4 h-4"></i>
                </button>
                <i data-lucide="search" class="w-4 h-4 text-zinc-500"></i>
                <input type="text" id="search-user-input" placeholder="Buscar usuario..." class="bg-transparent text-sm text-white focus:outline-none w-full placeholder-zinc-500">
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-2 space-y-1 bg-[#111B21]" id="private-chats-list">
            <p class="text-[12px] text-zinc-500 text-center py-4">No hay interacciones recientes</p>
        </div>
    </div>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-xs z-30 hidden transition-opacity duration-300" onclick="toggleSidebar(false)"></div>

    <!-- Cabecera Estilo Instagram Premium -->
    <header class="bg-[#111B21]/90 backdrop-blur-md border-b border-zinc-800/60 p-4 flex items-center justify-between sticky top-0 z-10 shadow-sm">
        <div class="flex items-center space-x-3 cursor-pointer group" id="global-header-btn">
            <div class="bg-gradient-to-tr from-yellow-500 via-red-500 to-purple-600 p-[2px] rounded-full shadow-md active:scale-95 transition-transform">
                <div class="bg-[#111B21] p-1.5 rounded-full text-white">
                    <i data-lucide="globe" id="header-icon" class="w-5 h-5"></i>
                </div>
            </div>
            <div>
                <h1 class="font-bold text-base tracking-wide flex items-center space-x-1 text-zinc-100 group-hover:text-zinc-300 transition-colors">
                    <span id="chat-title-text">Chat Global</span>
                    <i data-lucide="chevron-down" class="w-4 h-4 text-zinc-500 group-hover:text-zinc-300 transition-colors"></i>
                </h1>
                <p class="text-[11px] text-zinc-400 flex items-center mt-0.5">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 inline-block mr-1.5 animate-pulse"></span>
                    En vivo
                </p>
            </div>
        </div>
        <div class="flex items-center space-x-2 bg-[#202C33] px-3 py-1.5 rounded-full border border-zinc-800/80 shadow-inner">
            <i data-lucide="user" class="w-3.5 h-3.5 text-zinc-400"></i>
            <input type="text" id="username-input" value="Usuario Anonimo" class="bg-transparent text-xs font-semibold focus:outline-none w-24 text-zinc-200" title="Cambiar nombre de usuario">
        </div>
    </header>

    <!-- Contenedor Principal de Mensajes -->
    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 bg-[#0B141A] scrollbar-none pb-14">
    </main>

    <!-- Menú de Acciones de Mensajes -->
    <div id="action-menu" class="fixed inset-0 bg-black/60 backdrop-blur-xs z-50 hidden flex items-center justify-center p-4 transition-all" onclick="closeActionMenu()">
        <div class="bg-[#222E35] border border-zinc-800/80 rounded-2xl w-full max-w-xs overflow-hidden shadow-2xl animate-scale-up" onclick="event.stopPropagation()">
            <div id="menu-options" class="flex flex-col">
                <button id="btn-menu-private-chat" class="flex items-center space-x-3 px-4 py-3.5 hover:bg-[#2A3942] text-left text-sm transition-colors border-b border-zinc-800/50 hidden text-zinc-200">
                    <i data-lucide="message-square" class="w-4 h-4 text-sky-400"></i>
                    <span id="text-menu-private-chat">Chatear</span>
                </button>
                <button id="btn-menu-edit" class="flex items-center space-x-3 px-4 py-3.5 hover:bg-[#2A3942] text-left text-sm transition-colors border-b border-zinc-800/50 text-zinc-200">
                    <i data-lucide="pencil" class="w-4 h-4 text-zinc-400"></i>
                    <span>Editar mensaje</span>
                </button>
                <button id="btn-menu-delete" class="flex items-center space-x-3 px-4 py-3.5 hover:bg-[#2A3942] text-left text-sm text-red-400 font-medium transition-colors">
                    <i data-lucide="trash-2" class="w-4 h-4 text-red-400"></i>
                    <span id="text-menu-delete">Eliminar para todos</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Formulario de Entrada de Texto Estilo WhatsApp Premium -->
    <footer class="p-3 bg-[#111B21] border-t border-zinc-800/50 sticky bottom-0 z-10 shadow-lg">
        <form id="chat-form" class="flex flex-col max-w-3xl mx-auto relative">
            <div id="recording-waveform" class="hidden flex items-center justify-center space-x-1.5 py-2.5 mb-2 bg-[#202C33] border border-zinc-800 rounded-xl animate-fade-in">
                <span class="text-xs text-red-500 font-semibold mr-2 flex items-center">
                    <span class="w-2 h-2 rounded-full bg-red-500 mr-1.5 animate-pulse"></span> Grabando Audio
                </span>
                <div class="w-1 h-4 bg-red-500 rounded-full wave-bar"></div>
                <div class="w-1 h-6 bg-red-500 rounded-full wave-bar"></div>
                <div class="w-1 h-3 bg-red-500 rounded-full wave-bar"></div>
                <div class="w-1 h-5 bg-red-500 rounded-full wave-bar"></div>
                <div class="w-1 h-2 bg-red-500 rounded-full wave-bar"></div>
            </div>

            <div class="flex items-center space-x-2 w-full relative">
                <div class="relative flex items-center">
                    <button type="button" id="plus-btn" class="bg-[#202C33] border border-transparent hover:border-zinc-700 text-zinc-300 p-2.5 rounded-full transition-all active:scale-95 flex items-center justify-center shadow-sm">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                    </button>
                    <div id="attachment-menu" class="absolute bottom-14 left-0 bg-[#222E35] border border-zinc-800 rounded-2xl hidden flex-col w-44 overflow-hidden shadow-2xl z-20 animate-scale-up">
                        <button type="button" id="opt-camera" class="flex items-center space-x-3 px-4 py-3 hover:bg-[#2A3942] text-left text-sm text-zinc-200 transition-colors border-b border-zinc-800/50">
                            <i data-lucide="camera" class="w-4 h-4 text-zinc-400"></i>
                            <span>Tomar foto</span>
                        </button>
                        <button type="button" id="opt-gallery" class="flex items-center space-x-3 px-4 py-3 hover:bg-[#2A3942] text-left text-sm text-zinc-200 transition-colors">
                            <i data-lucide="image" class="w-4 h-4 text-zinc-400"></i>
                            <span>Dispositivo</span>
                        </button>
                    </div>
                    <input type="file" id="camera-input" accept="image/*" capture="camera" class="hidden">
                    <input type="file" id="gallery-input" accept="image/*" class="hidden">
                </div>

                <div class="flex-1 relative flex items-center bg-[#202C33] border border-transparent rounded-2xl px-4 py-2.5 focus-within:border-zinc-700 transition-all shadow-inner">
                    <input type="text" id="message-input" autocomplete="off" placeholder="Escribe un mensaje aquí..." 
                           class="w-full bg-transparent text-sm focus:outline-none text-zinc-100 placeholder-zinc-500 pr-14 select-text">
                    <button type="submit" class="absolute right-4 text-sky-500 hover:text-sky-400 font-bold text-sm transition-all active:scale-95 tracking-wide">
                        Enviar
                    </button>
                </div>
                <button type="button" id="mic-btn" class="bg-[#202C33] border border-transparent hover:border-zinc-700 text-zinc-300 p-2.5 rounded-full transition-all active:scale-95 flex items-center justify-center relative shadow-sm">
                    <i data-lucide="mic" id="mic-icon" class="w-5 h-5"></i>
                    <span id="mic-pulse" class="absolute inset-0 rounded-full bg-red-500/20 animate-ping hidden"></span>
                </button>
            </div>
        </form>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, update, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpszIcvVtVhaNqUu9C2SicT5UbZOrXA8E",
            authDomain: "chatglobal-c68a3.firebaseapp.com",
            databaseURL: "https://chatglobal-c68a3-default-rtdb.firebaseio.com",
            projectId: "chatglobal-c68a3",
            storageBucket: "chatglobal-c68a3.firebasestorage.app",
            messagingSenderId: "149154535708",
            appId: "1:149154535708:web:276b94267ce1c4b5c3c2d9",
            measurementId: "G-03PGJ4HNPK"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Control de rutas del chat activo
        let currentChatMode = 'global'; 
        let privateChatId = null;
        let currentActiveRef = ref(db, 'messages');
        let unsubscribeCurrentListener = null;

        lucide.createIcons();

        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const usernameInput = document.getElementById('username-input');
        const micBtn = document.getElementById('mic-btn');
        const micIcon = document.getElementById('mic-icon');
        const micPulse = document.getElementById('mic-pulse');
        const recordingWaveform = document.getElementById('recording-waveform');
        
        const plusBtn = document.getElementById('plus-btn');
        const attachmentMenu = document.getElementById('attachment-menu');
        const optCamera = document.getElementById('opt-camera');
        const optGallery = document.getElementById('opt-gallery');
        const cameraInput = document.getElementById('camera-input');
        const galleryInput = document.getElementById('gallery-input');

        const actionMenu = document.getElementById('action-menu');
        const menuOptions = document.getElementById('menu-options');
        const btnMenuEdit = document.getElementById('btn-menu-edit');
        const btnMenuDelete = document.getElementById('btn-menu-delete');
        const btnMenuPrivateChat = document.getElementById('btn-menu-private-chat');
        const textMenuPrivateChat = document.getElementById('text-menu-private-chat');
        const globalHeaderBtn = document.getElementById('global-header-btn');
        const chatTitleText = document.getElementById('chat-title-text');
        const headerIcon = document.getElementById('header-icon');

        // Efectos de sonido integrados nativos en Base64
        const sendSound = new Audio("data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjYwLjEwMC4xMDMAAAAAAAAAAAAAAAAAAAAAAAAAAP/4XAAAAAAAAG5pY28AAAAAAAAAAAAAAAAAAAAAAMgA/gBcAAEmBv8AFlH/4XgAOv8AAmwG/wAWUf/heABm/wAEEwb/ABZR/+F4AD7/AAITBv8AFlH/4XgAQv8AAhMG/wA=");
        const receiveSound = new Audio("data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjYwLjEwMC4xMDMAAAAAAAAAAAAAAAAAAAAAAAAAAP/4XAAAAAAAAG5pY28AAAAAAAAAAAAAAAAAAAAAAMgA/gBcAAEmBv8AFlH/4XgAOv8AAmwG/wAWUf/heABm/wAEEwb/ABZR/+F4AD7/AAITBv8AFlH/4XgAQv8AAhMG/wA=");
        sendSound.volume = 0.5;
        receiveSound.volume = 0.5;

        // Mapeos globales para la funcionalidad del buscador e interacciones
        let globalUsersMap = {};
        let privateInteractionsMap = JSON.parse(localStorage.getItem('chat_private_interactions') || '{}');

        if (!localStorage.getItem('chat_user_id')) {
            localStorage.setItem('chat_user_id', 'user_' + Math.random().toString(36).substr(2, 9));
        }
        const myUserId = localStorage.getItem('chat_user_id');

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        let selectedMessageId = null;

        // --- LÓGICA DE NOMBRE OBLIGATORIO Y LÍMITE DE 37 DÍAS ---
        let localName = localStorage.getItem('chat_username');
        let localNameDate = localStorage.getItem('chat_username_change_date');

        if (!localName || localName === 'Usuario Anonimo' || localName.trim() === '') {
            let forcedName = '';
            while (!forcedName || forcedName.trim() === '' || forcedName === 'Usuario Anonimo') {
                forcedName = prompt('Por favor, ingresa un nombre obligatorio para usar el chat:');
            }
            localName = forcedName.trim();
            localNameDate = Date.now().toString();
            localStorage.setItem('chat_username', localName);
            localStorage.setItem('chat_username_change_date', localNameDate);
        }

        usernameInput.value = localName;

        const msIn37Days = 37 * 24 * 60 * 60 * 1000; 
        if (localNameDate && (Date.now() - parseInt(localNameDate) < msIn37Days)) {
            usernameInput.disabled = true;
            usernameInput.title = "No puedes cambiar tu nombre hasta cumplir el lapso de 37 días.";
            usernameInput.classList.add('opacity-50', 'cursor-not-allowed');
        }

        usernameInput.addEventListener('input', () => {
            if (usernameInput.disabled) return;
            const updatedName = usernameInput.value.trim();
            if (updatedName !== '' && updatedName !== 'Usuario Anonimo') {
                localStorage.setItem('chat_username', updatedName);
                localStorage.setItem('chat_username_change_date', Date.now().toString());
            }
        });
        // --------------------------------------------------------

        plusBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            attachmentMenu.classList.toggle('hidden');
        });

        document.addEventListener('click', () => {
            attachmentMenu.classList.add('hidden');
        });

        optCamera.addEventListener('click', () => cameraInput.click());
        optGallery.addEventListener('click', () => galleryInput.click());

        function handleImageUpload(inputElement) {
            const file = inputElement.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = () => {
                const base64Image = reader.result;
                const username = usernameInput.value.trim() || 'Anónimo';

                const newMessageRef = push(currentActiveRef);
                const payload = {
                    userId: myUserId,
                    username: username,
                    image: base64Image,
                    type: 'image',
                    timestamp: serverTimestamp()
                };
                if (currentChatMode === 'private') {
                    payload.status = 'sent';
                }
                set(newMessageRef, payload).then(() => {
                    if (currentChatMode === 'private') sendSound.play().catch(()=>{});
                });
            };
            inputElement.value = '';
        }

        cameraInput.addEventListener('change', () => handleImageUpload(cameraInput));
        galleryInput.addEventListener('change', () => handleImageUpload(galleryInput));

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            const username = usernameInput.value.trim() || 'Anónimo';

            if (text === '') return;

            const newMessageRef = push(currentActiveRef);
            const payload = {
                userId: myUserId,
                username: username,
                text: text,
                type: 'text',
                timestamp: serverTimestamp()
            };
            if (currentChatMode === 'private') {
                payload.status = 'sent';
            }
            set(newMessageRef, payload).then(() => {
                if (currentChatMode === 'private') sendSound.play().catch(()=>{});
            });

            messageInput.value = '';
        });

        micBtn.addEventListener('click', async () => {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => {
                            const base64Audio = reader.result;
                            const username = usernameInput.value.trim() || 'Anónimo';
                            
                            const newMessageRef = push(currentActiveRef);
                            const payload = {
                                userId: myUserId,
                                username: username,
                                audio: base64Audio,
                                type: 'audio',
                                timestamp: serverTimestamp()
                            };
                            if (currentChatMode === 'private') {
                                payload.status = 'sent';
                            }
                            set(newMessageRef, payload).then(() => {
                                if (currentChatMode === 'private') sendSound.play().catch(()=>{});
                            });
                        };

                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    micBtn.classList.add('bg-red-600', 'border-red-500');
                    micIcon.classList.add('text-white');
                    micPulse.classList.remove('hidden');
                    recordingWaveform.classList.remove('hidden');
                    recordingWaveform.classList.add('flex');

                } catch (err) {
                    alert('No se pudo acceder al micrófono: ' + err.message);
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                micBtn.classList.remove('bg-red-600', 'border-red-500');
                micIcon.classList.remove('text-white');
                micPulse.classList.add('hidden');
                recordingWaveform.classList.add('hidden');
                recordingWaveform.classList.remove('flex');
            }
        });

        // Gestionar conexión activa y sincronizar con Firebase
        function listenToMessages() {
            if (unsubscribeCurrentListener) {
                unsubscribeCurrentListener();
            }

            unsubscribeCurrentListener = onValue(currentActiveRef, (snapshot) => {
                const isAtBottom = chatBox.scrollHeight - chatBox.clientHeight <= chatBox.scrollTop + 100;

                const welcomeText = currentChatMode === 'global' 
                    ? 'Conectado al canal global de forma segura. ¡Mantén presionado un mensaje para ver opciones!'
                    : 'Estás en un chat privado seguro y cifrado. Presiona "Chat privado" en la cabecera para regresar.';

                chatBox.innerHTML = `
                    <div class="flex justify-center my-4">
                        <span class="text-zinc-500 text-xs text-center px-4 max-w-sm bg-[#111B21] py-1.5 rounded-xl border border-zinc-800/40 shadow-sm">
                            ${welcomeText}
                        </span>
                    </div>
                `;
                
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const messageId = childSnapshot.key;
                        const data = childSnapshot.val();
                        const isMe = data.userId === myUserId;
                        
                        // Lógica de confirmation de lectura en tiempo real para chat privado
                        if (currentChatMode === 'private' && !isMe && data.status !== 'read') {
                            update(ref(db, `private_messages/${privateChatId}/${messageId}`), { status: 'read' });
                            data.status = 'read';
                        }
                        
                        appendMessage(messageId, data, isMe);
                    });
                }

                if (isAtBottom) {
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            });
        }

        // Función para retornar al canal de chat global de forma explícita
        window.goToGlobalChat = function() {
            currentChatMode = 'global';
            chatTitleText.innerText = `Chat Global`;
            headerIcon.setAttribute('data-lucide', 'globe');
            currentActiveRef = ref(db, 'messages');
            listenToMessages();
            lucide.createIcons();
        };

        // Controladores globales para el Sidebar de Chats privados interactuados
        window.toggleSidebar = function(show) {
            const sidebar = document.getElementById('sidebar-chats');
            const overlay = document.getElementById('sidebar-overlay');
            if (show) {
                renderInteractionsList();
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        };

        // Escucha global en segundo plano para rastrear nombres del chat global y capturar mensajes privados entrantes
        onValue(ref(db, 'messages'), (snapshot) => {
            if(snapshot.exists()) {
                snapshot.forEach((child) => {
                    const data = child.val();
                    if(data.userId && data.username && data.userId !== myUserId) {
                        globalUsersMap[data.userId] = data.username;
                    }
                });
            }
        });

        // Escuchador reactivo para las alertas de notificaciones de todos los chats privados del usuario
        onValue(ref(db, 'private_messages'), (snapshot) => {
            if(snapshot.exists()) {
                snapshot.forEach((chatChild) => {
                    const chatId = chatChild.key;
                    if(chatId.includes(myUserId)) {
                        let lastMsg = null;
                        let lastMsgId = null;
                        chatChild.forEach((msgChild) => { 
                            lastMsg = msgChild.val(); 
                            lastMsgId = msgChild.key;
                        });
                        
                        if(lastMsg && lastMsg.userId !== myUserId) {
                            // Si el receptor tiene internet, pasa automáticamente de 'sent' a 'delivered'
                            if (lastMsg.status === 'sent') {
                                update(ref(db, `private_messages/${chatId}/${lastMsgId}`), { status: 'delivered' });
                                lastMsg.status = 'delivered';
                            }
                            
                            // Reproducir sonido si está en otra sala o fuera de ese chat privado específico
                            if (lastMsg.timestamp && (Date.now() - lastMsg.timestamp < 6000)) {
                                if (currentChatMode !== 'private' || privateChatId !== chatId) {
                                    receiveSound.play().catch(()=>{});
                                    if (currentChatMode !== 'private' || privateChatId !== chatId) {
                                        showInAppNotification(lastMsg, chatId);
                                    }
                                }
                            }
                        }
                    }
                });
            }
        });

        function showInAppNotification(msg, chatId) {
            const notifBox = document.getElementById('in-app-notification');
            const notifUser = document.getElementById('notif-user');
            const notifText = document.getElementById('notif-text');
            const notifAvatar = document.getElementById('notif-avatar');
            
            notifUser.innerText = msg.username || "Usuario";
            notifAvatar.innerText = (msg.username || "U").substring(0, 2);
            
            if(msg.type === 'image' || msg.image) {
                notifText.innerText = "Te envió una Foto 📷";
            } else if(msg.type === 'audio' || msg.audio) {
                notifText.innerText = "Te envió un Audio 🎙️";
            } else {
                notifText.innerText = msg.text || "Te envió un mensaje";
            }

            notifBox.classList.remove('hidden');
            notifBox.classList.add('flex');

            notifBox.onclick = () => {
                notifBox.classList.add('hidden');
                notifBox.classList.remove('flex');
                currentChatMode = 'private';
                privateChatId = chatId;
                
                // Guardar la interacción persistente para que aparezca en la lista
                saveInteraction(msg.userId, msg.username);
                
                chatTitleText.innerText = `Chat con ${msg.username}`;
                headerIcon.setAttribute('data-lucide', 'message-square');
                currentActiveRef = ref(db, `private_messages/${privateChatId}`);
                listenToMessages();
                lucide.createIcons();
            };

            setTimeout(() => {
                notifBox.classList.add('hidden');
                notifBox.classList.remove('flex');
            }, 4500);
        }

        function saveInteraction(userId, username) {
            privateInteractionsMap[userId] = username;
            localStorage.setItem('chat_private_interactions', JSON.stringify(privateInteractionsMap));
        }

        function renderInteractionsList(filterText = '') {
            const container = document.getElementById('private-chats-list');
            container.innerHTML = '';

            // Fusionar los usuarios conocidos del chat global para el motor de búsqueda por Lupita
            let displayMap = { ...privateInteractionsMap };
            if (filterText.trim() !== '') {
                displayMap = { ...globalUsersMap, ...privateInteractionsMap };
            }

            const keys = Object.keys(displayMap).filter(id => id !== myUserId);
            let addedCount = 0;

            keys.forEach((id) => {
                const name = displayMap[id];
                if (filterText !== '' && !name.toLowerCase().includes(filterText.toLowerCase())) return;
                
                addedCount++;
                const itemHTML = `
                    <div onclick="startPrivateChat('${id}', '${name}')" class="flex items-center space-x-3 p-2.5 hover:bg-[#202C33] rounded-xl cursor-pointer transition-colors border border-transparent hover:border-zinc-800/40">
                        <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-zinc-700 to-zinc-800 border border-zinc-700 flex items-center justify-center font-bold text-xs text-zinc-300 shadow-sm uppercase tracking-wider">
                            ${name.substring(0, 2).toUpperCase()}
                        </div>
                        <div class="flex-1 overflow-hidden">
                            <h3 class="text-xs font-semibold text-zinc-200 truncate">${name}</h3>
                            <p class="text-[11px] text-zinc-500 truncate mt-0.5">Presiona para chatear en privado</p>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', itemHTML);
            });

            if(addedCount === 0) {
                container.innerHTML = `<p class="text-[11px] text-zinc-600 text-center py-4">No se encontraron resultados</p>`;
            }
        }

        document.getElementById('search-user-input').addEventListener('input', (e) => {
            renderInteractionsList(e.target.value);
        });

        // Evento modificado de la cabecera: despliega el menú lateral al hacerle click
        globalHeaderBtn.addEventListener('click', () => {
            toggleSidebar(true);
        });

        window.toggleAudioPlay = function(btn, audioId) {
            const audioEl = document.getElementById(audioId);
            const playIcon = btn.querySelector('.play-ic');
            const pauseIcon = btn.querySelector('.pause-ic');
            const progressEl = btn.closest('.audio-player-container').querySelector('.audio-progress');
            const timeEl = btn.closest('.audio-player-container').querySelector('.audio-time');

            if (audioEl.paused) {
                document.querySelectorAll('audio').forEach(a => {
                    if (a.id !== audioId && !a.paused) {
                        a.pause();
                        const trackingBtn = a.closest('.message-bubble').querySelector('.audio-play-btn');
                        if (trackingBtn) {
                            trackingBtn.querySelector('.play-ic').classList.remove('hidden');
                            trackingBtn.querySelector('.pause-ic').classList.add('hidden');
                        }
                    }
                });

                audioEl.play();
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                audioEl.pause();
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }

            audioEl.ontimeupdate = () => {
                const percentage = (audioEl.currentTime / audioEl.duration) * 100;
                progressEl.style.width = `${percentage}%`;
                
                let mins = Math.floor(audioEl.currentTime / 60);
                let secs = Math.floor(audioEl.currentTime % 60);
                timeEl.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            };

            audioEl.onended = () => {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                progressEl.style.width = '0%';
                timeEl.innerText = '0:00';
            };

            audioEl.onloadedmetadata = () => {
                let mins = Math.floor(audioEl.duration / 60);
                let secs = Math.floor(audioEl.duration % 60);
                if (!isNaN(audioEl.duration)) {
                    timeEl.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                }
            };
        };

        function appendMessage(messageId, data, isMe) {
            let timeString = "...";
            if(data.timestamp) {
                timeString = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            const initials = data.username.substring(0, 2).toUpperCase();
            
            const avatarBg = isMe ? 'hidden' : 'bg-gradient-to-tr from-zinc-800 to-zinc-700 border border-zinc-700/60';
            const bubbleBg = isMe ? 'bg-[#005C4B] text-white' : 'bg-[#202C33] text-zinc-100';
            const alignClass = isMe ? 'justify-end' : 'justify-start';
            const roundedClass = isMe ? 'rounded-[16px] rounded-tr-none' : 'rounded-[16px] rounded-tl-none';

            // Selector dinámico de palomitas de estado para chats privados
            let statusTicks = '';
            if (currentChatMode === 'private' && isMe) {
                if (data.status === 'read') {
                    statusTicks = `<span class="text-sky-400 ml-1 font-bold">✓✓</span>`;
                } else if (data.status === 'delivered') {
                    statusTicks = `<span class="text-zinc-400 ml-1 font-bold">✓✓</span>`;
                } else {
                    statusTicks = `<span class="text-zinc-400 ml-1 font-bold">✓</span>`;
                }
            }

            let contentHTML = '';
            if (data.type === 'audio' || data.audio) {
                const uniqueAudioId = `native-audio-${messageId}`;
                contentHTML = `
                    <div class="flex items-center space-x-3 py-1.5 min-w-[220px] audio-player-container select-none" onclick="event.stopPropagation();">
                        <audio id="${uniqueAudioId}" src="${data.audio}" class="hidden" preload="metadata"></audio>
                        
                        <button onclick="toggleAudioPlay(this, '${uniqueAudioId}')" class="audio-play-btn flex items-center justify-center w-9 h-9 rounded-full bg-black/20 hover:bg-black/30 transition-all flex-shrink-0 active:scale-95">
                            <i data-lucide="play" class="w-4 h-4 play-ic text-white fill-white"></i>
                            <i data-lucide="pause" class="w-4 h-4 pause-ic text-white fill-white hidden"></i>
                        </button>
                        
                        <div class="flex-1 flex flex-col justify-center space-y-1.5">
                            <div class="relative w-full h-1 bg-white/20 rounded-full overflow-hidden">
                                <div class="audio-progress absolute top-0 left-0 h-full bg-sky-400 rounded-full transition-all duration-100" style="w-0%"></div>
                            </div>
                            <div class="flex justify-between items-center text-[10px] opacity-70">
                                <span class="audio-time font-mono">0:00</span>
                                <i data-lucide="mic" class="w-3 h-3 text-sky-400"></i>
                            </div>
                        </div>
                    </div>
                `;
            } else if (data.type === 'image' || data.image) {
                contentHTML = `<img src="${data.image}" class="max-w-[240px] w-full rounded-lg object-cover shadow-sm border border-black/10" onclick="event.stopPropagation();" alt="Imagen">`;
            } else {
                contentHTML = `<div class="text-[14.5px] break-words leading-relaxed select-text font-normal">${data.text || ''}</div>`;
            }

            const messageHTML = `
                <div class="flex items-end space-x-2 w-full max-w-2xl mx-auto ${alignClass} animate-fade-in relative group custom-msg-select"
                     data-id="${messageId}" 
                     data-me="${isMe}" 
                     data-userid="${data.userId}"
                     data-username="${btoa(encodeURIComponent(data.username || 'Anónimo'))}"
                     data-type="${data.type || 'text'}" 
                     data-text="${btoa(encodeURIComponent(data.text || ''))}"
                     oncontextmenu="event.preventDefault(); openMessageMenu(this);"
                     onload="setupLongPress(this)">
                    
                    ${!isMe ? `
                    <div class="w-7 h-7 rounded-full ${avatarBg} flex items-center justify-center font-bold text-[10px] text-zinc-300 flex-shrink-0 shadow-sm uppercase tracking-wider">
                        ${initials}
                    </div>` : ''}
                    
                    <div class="flex flex-col max-w-[75%] ${isMe ? 'items-end' : 'items-start'} relative pb-1">
                        ${!isMe ? `<span class="text-[11px] font-semibold text-zinc-400 mb-1 ml-1.5">${data.username}</span>` : ''}
                        <div class="message-bubble ${bubbleBg} px-3.5 py-2 ${roundedClass} shadow-[0_1px_2px_rgba(0,0,0,0.3)] relative cursor-pointer active:opacity-90 transition-opacity" onclick="openMessageMenu(this.closest('[data-id]'))">
                            ${contentHTML}
                        </div>
                        <span class="text-[9px] text-zinc-500 mt-1 px-1 flex items-center font-medium tracking-wide">${timeString} ${data.edited ? '(editado)' : ''} ${statusTicks}</span>
                    </div>
                </div>
            `;

            chatBox.insertAdjacentHTML('beforeend', messageHTML);
            
            const element = chatBox.lastElementChild;
            setupLongPress(element);
            
            lucide.createIcons();
        }

        function setupLongPress(element) {
            let pressTimer;
            
            const startPress = () => {
                pressTimer = setTimeout(() => {
                    openMessageMenu(element);
                }, 500);
            };

            const cancelPress = () => {
                clearTimeout(pressTimer);
            };

            element.addEventListener('touchstart', startPress, { passive: true });
            element.addEventListener('touchend', cancelPress, { passive: true });
            element.addEventListener('touchmove', cancelPress, { passive: true });
            element.addEventListener('mousedown', startPress);
            element.addEventListener('mouseup', cancelPress);
            element.addEventListener('mouseleave', cancelPress);
        }

        window.openMessageMenu = function(element) {
            if (navigator.vibrate) {
                navigator.vibrate(40);
            }
            selectedMessageId = element.getAttribute('data-id');
            const isMe = element.getAttribute('data-me') === 'true';
            const targetUserId = element.getAttribute('data-userid');
            const targetUsername = decodeURIComponent(atob(element.getAttribute('data-username')));
            const isAudio = element.getAttribute('data-type') === 'audio';
            const isImage = element.getAttribute('data-type') === 'image';
            const encodedText = element.getAttribute('data-text');

            const textMenuDelete = document.getElementById('text-menu-delete');

            // Mostrar opción de chat privado si el mensaje no es del propio usuario logueado
            if (!isMe && currentChatMode === 'global') {
                btnMenuPrivateChat.classList.remove('hidden');
                textMenuPrivateChat.innerText = `Chat privado con ${targetUsername}`;
                btnMenuPrivateChat.onclick = () => {
                    closeActionMenu();
                    startPrivateChat(targetUserId, targetUsername);
                };
            } else {
                btnMenuPrivateChat.classList.add('hidden');
            }

            if (isMe) {
                menuOptions.classList.remove('hidden');
                btnMenuEdit.classList.remove('hidden');
                textMenuDelete.innerText = "Eliminar para todos";
                if(isAudio || isImage) {
                    btnMenuEdit.classList.add('hidden');
                } else {
                    btnMenuEdit.classList.remove('hidden');
                    btnMenuEdit.onclick = () => { closeActionMenu(); triggerEdit(selectedMessageId, encodedText); };
                }
                btnMenuDelete.onclick = () => { closeActionMenu(); triggerDelete(selectedMessageId); };
            } else {
                // Si NO es mi mensaje, ocultamos el botón de editar obligatoriamente
                btnMenuEdit.classList.add('hidden');
                menuOptions.classList.remove('hidden');
                
                // Cambiar el texto a eliminar para mí solo y configurar acción local
                textMenuDelete.innerText = "Eliminar para mi solo";
                btnMenuDelete.onclick = () => {
                    closeActionMenu();
                    if (confirm('¿Seguro que deseas eliminar este mensaje para ti solo?')) {
                        const targetBubble = document.querySelector(`[data-id="${selectedMessageId}"]`);
                        if(targetBubble) targetBubble.remove();
                    }
                };

                if (currentChatMode !== 'global') {
                    // Mantiene compatibilidad original con chats privados ajenos si fuera necesario
                }
            }

            actionMenu.classList.remove('hidden');
            actionMenu.classList.add('flex');
        };

        // Lógica de inicialización para salas de chat privado
        function startPrivateChat(targetUserId, targetUsername) {
            currentChatMode = 'private';
            saveInteraction(targetUserId, targetUsername);
            
            // Crear identificador alfabético único basado en los dos IDs de usuario
            const sortedIds = [myUserId, targetUserId].sort();
            privateChatId = `chat_${sortedIds[0]}_${sortedIds[1]}`;
            
            chatTitleText.innerText = `Chat con ${targetUsername}`;
            headerIcon.setAttribute('data-lucide', 'message-square');
            
            currentActiveRef = ref(db, `private_messages/${privateChatId}`);
            listenToMessages();
            lucide.createIcons();
        }

        window.closeActionMenu = function() {
            actionMenu.classList.remove('flex');
            actionMenu.classList.add('hidden');
        };

        function triggerEdit(messageId, encodedText) {
            const currentText = decodeURIComponent(atob(encodedText));
            const newText = prompt('Edita tu mensaje:', currentText);
            
            if (newText !== null && newText.trim() !== '' && newText.trim() !== currentText) {
                const messageRef = ref(db, `${currentChatMode === 'global' ? 'messages' : 'private_messages/' + privateChatId}/${messageId}`);
                update(messageRef, {
                    text: newText.trim(),
                    edited: true
                }).catch((error) => alert('Error al editar: ' + error.message));
            }
        }

        function triggerDelete(messageId) {
            if (confirm('¿Seguro que deseas eliminar este mensaje para todos?')) {
                const messageRef = ref(db, `${currentChatMode === 'global' ? 'messages' : 'private_messages/' + privateChatId}/${messageId}`);
                remove(messageRef).catch((error) => alert('Error alPost: ' + error.message));
            }
        }

        // Ejecución inicial en canal global
        listenToMessages();
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes waveGlow {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(2.0); }
        }
        .animate-fade-in { animation: fadeIn 0.15s ease-out forwards; }
        .animate-scale-up { animation: scaleUp 0.15s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        
        .wave-bar { 
            animation: waveGlow 0.6s ease-in-out infinite; 
            transform-origin: center;
        }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .wave-bar:nth-child(4) { animation-delay: 0.15s; }
        .wave-bar:nth-child(5) { animation-delay: 0.05s; }
    </style>
</body>
</html>
